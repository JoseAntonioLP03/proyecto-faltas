<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute left-[-8rem] top-[-8rem] h-72 w-72 rounded-full bg-cyan-400/10 blur-3xl"></div>
    <div class="absolute right-[-6rem] top-20 h-72 w-72 rounded-full bg-indigo-400/10 blur-3xl"></div>
    <div class="absolute bottom-[-10rem] left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-emerald-400/10 blur-3xl"></div>
  </div>

  <header class="relative z-10 border-b border-white/10 bg-slate-950/75 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-5 lg:flex-row lg:items-center lg:justify-between">
      <div>
        <p class="text-sm font-medium tracking-wider text-cyan-300/80">Tajamar</p>
        <h1 class="mt-2 text-2xl font-semibold text-white">Control de Asistencia</h1>
        <p class="mt-1 text-sm text-slate-400">Alumno, profesor y administración sobre una misma base visual.</p>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <span class="rounded-full border border-cyan-300/20 bg-cyan-300/10 px-4 py-2 text-sm text-cyan-100" *ngIf="isAuthenticated()">
          {{ currentRoleLabel() }} · {{ currentUserName() }}
        </span>
        <a routerLink="/login" routerLinkActive="bg-white text-slate-950" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-100 transition hover:border-cyan-300/50 hover:bg-white/5">Login</a>
        <a routerLink="/student" routerLinkActive="bg-cyan-300 text-slate-950" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-100 transition hover:border-cyan-300/50 hover:bg-white/5">Alumno</a>
        <a routerLink="/teacher" routerLinkActive="bg-cyan-300 text-slate-950" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-100 transition hover:border-cyan-300/50 hover:bg-white/5">Profesor</a>
        <a routerLink="/admin" routerLinkActive="bg-cyan-300 text-slate-950" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-100 transition hover:border-cyan-300/50 hover:bg-white/5">Administrador</a>
        <button *ngIf="isAuthenticated()" type="button" class="rounded-full border border-rose-400/30 bg-rose-400/10 px-4 py-2 text-sm text-rose-100 transition hover:bg-rose-400/20" (click)="logout()">Salir</button>
      </div>
    </div>
  </header>

  <main class="relative z-10 mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <router-outlet></router-outlet>
  </main>
</div>
